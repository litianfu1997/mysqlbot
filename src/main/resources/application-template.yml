server:
  port: 8080

spring:
  application:
    name: MySqlBot

  # ===== Java 21 虚拟线程 =====
  threads:
    virtual:
      enabled: true

  # ===== 主数据库 (PostgreSQL - 业务表) =====
  datasource:
    url: jdbc:postgresql://localhost:5432/mysqlbot
    username: postgres
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ===== MySqlBot 自定义配置 =====
mysqlbot:
  # SQL 执行安全配置
  sql:
    # 只允许 SELECT 查询
    allow-only-select: true
    # 查询结果最大行数
    max-rows: 1000
    # 查询超时（秒）
    timeout-seconds: 30
    # LLM 生成 SQL 失败后最大重试次数
    max-retry: 3
  # LLM 工具调用配置（SQL 生成 Agent）
  tool:
    # Agent 工具探索最大轮次（超出后强制输出答案）
    max-rounds: 8
  # 制图 Agent 工具探查最大轮次
  chart:
    max-rounds: 3
  # 追问 Agent 工具探查最大轮次
  suggest:
   max-rounds: 3

  # Schema metadata cache (TTL based, default 5 minutes)
  cache:
    schema-ttl-seconds: 300

logging:
  level:
    com.example.mysqlbot: DEBUG
